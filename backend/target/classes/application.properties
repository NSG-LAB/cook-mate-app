# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Database ──────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cookmate_student?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── JWT ───────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:dev-secret-change-me}
app.jwt.expiration-ms=${JWT_EXPIRY_MS:86400000}

# ── Redis (Networks) ──────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.cache.type=redis
