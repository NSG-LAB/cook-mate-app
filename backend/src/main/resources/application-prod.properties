# ── Server ──────────────────────────────────────────────────────
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024
server.http2.enabled=true
server.servlet.session.timeout=30m

# ── Datasource / Hikari ─────────────────────────────────────────
spring.datasource.hikari.pool-name=CookmatePool
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.minimum-idle=6
spring.datasource.hikari.idle-timeout=120000
spring.datasource.hikari.connection-timeout=25000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.validation-timeout=3000

# ── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── Caching ─────────────────────────────────────────────────────
spring.cache.type=simple
spring.cache.cache-names=recipes:budget,recipes:fridge,recipes:cookAgain,recipes:seasonal,recipes:weather,recipes:occasion,recipes:list

# ── Logging ─────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# ── Web ─────────────────────────────────────────────────────────
spring.web.resources.cache.period=3600
spring.mvc.async.request-timeout=20s
